<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Pro | Premium Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #687083;
        --line: rgba(23, 32, 51, 0.1);
        --panel: rgba(255, 255, 255, 0.78);
        --shadow: 0 18px 60px rgba(40, 48, 72, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(251, 113, 133, 0.18), transparent 28rem),
          radial-gradient(circle at 78% 5%, rgba(20, 184, 166, 0.18), transparent 26rem),
          linear-gradient(135deg, #f8fafc 0%, #eef2f7 52%, #f7f1ea 100%);
        transition:
          background 0.25s ease,
          color 0.25s ease;
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --ink: #e5edf8;
        --muted: #9aa7bb;
        --line: rgba(226, 232, 240, 0.14);
        --panel: rgba(15, 23, 42, 0.76);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
        background:
          radial-gradient(circle at 18% 10%, rgba(20, 184, 166, 0.16), transparent 28rem),
          radial-gradient(circle at 78% 6%, rgba(244, 63, 94, 0.14), transparent 26rem),
          linear-gradient(135deg, #07111f 0%, #101827 52%, #17111c 100%);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .glass {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.72);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .soft-panel {
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid var(--line);
        box-shadow: 0 14px 40px rgba(40, 48, 72, 0.08);
        backdrop-filter: blur(16px);
      }

      .theme-toggle {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
      }

      .theme-toggle::before {
        width: 1.35rem;
        height: 1.35rem;
        border-radius: 999px;
        background: #0f172a;
        box-shadow: inset -0.35rem -0.2rem 0 #f8fafc;
        content: "";
        transition:
          background-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .progress-chart {
        --progress: 0deg;
        width: 4.25rem;
        height: 4.25rem;
        border-radius: 999px;
        background: conic-gradient(#14b8a6 var(--progress), rgba(226, 232, 240, 0.9) 0);
        display: grid;
        place-items: center;
      }

      .progress-chart::before {
        width: 3rem;
        height: 3rem;
        border-radius: inherit;
        background: rgba(255, 255, 255, 0.94);
        content: "";
        grid-area: 1 / 1;
      }

      .progress-chart-value {
        grid-area: 1 / 1;
        position: relative;
        z-index: 1;
      }

      .due-alert-card {
        border-color: rgba(225, 29, 72, 0.75) !important;
        box-shadow:
          0 0 0 1px rgba(225, 29, 72, 0.16),
          0 16px 34px rgba(225, 29, 72, 0.14);
      }

      body[data-theme="dark"] .theme-toggle::before {
        background: #facc15;
        box-shadow: 0 0 0 0.28rem rgba(250, 204, 21, 0.16);
      }

      body[data-theme="dark"] .glass,
      body[data-theme="dark"] .soft-panel {
        background: var(--panel);
        border-color: rgba(148, 163, 184, 0.18);
      }

      body[data-theme="dark"] .task-list.drag-over {
        background: rgba(30, 41, 59, 0.68);
        border-color: rgba(45, 212, 191, 0.34);
      }

      body[data-theme="dark"] input,
      body[data-theme="dark"] select,
      body[data-theme="dark"] textarea,
      body[data-theme="dark"] .task-card,
      body[data-theme="dark"] .empty-state,
      body[data-theme="dark"] .filter-btn,
      body[data-theme="dark"] #clearDoneBtn {
        background-color: rgba(15, 23, 42, 0.82) !important;
        border-color: rgba(148, 163, 184, 0.22) !important;
        color: #e5edf8 !important;
      }

      body[data-theme="dark"] input::placeholder,
      body[data-theme="dark"] textarea::placeholder {
        color: #7f8da3;
      }

      body[data-theme="dark"] .bg-white,
      body[data-theme="dark"] .bg-white\/40,
      body[data-theme="dark"] .bg-white\/70 {
        background-color: rgba(15, 23, 42, 0.72) !important;
      }

      body[data-theme="dark"] .bg-slate-100,
      body[data-theme="dark"] .bg-slate-200 {
        background-color: rgba(51, 65, 85, 0.82) !important;
      }

      body[data-theme="dark"] .bg-slate-50 {
        background-color: rgba(51, 65, 85, 0.92) !important;
      }

      body[data-theme="dark"] .text-slate-500,
      body[data-theme="dark"] .text-slate-600 {
        color: #cbd5e1 !important;
      }

      body[data-theme="dark"] .ring-slate-200 {
        --tw-ring-color: rgba(148, 163, 184, 0.32) !important;
      }

      body[data-theme="dark"] .bg-amber-50 {
        background-color: rgba(120, 53, 15, 0.72) !important;
      }

      body[data-theme="dark"] .text-amber-700 {
        color: #fde68a !important;
      }

      body[data-theme="dark"] .ring-amber-200 {
        --tw-ring-color: rgba(251, 191, 36, 0.34) !important;
      }

      body[data-theme="dark"] .bg-rose-50 {
        background-color: rgba(127, 29, 29, 0.72) !important;
      }

      body[data-theme="dark"] .text-rose-700 {
        color: #fecdd3 !important;
      }

      body[data-theme="dark"] .ring-rose-200 {
        --tw-ring-color: rgba(251, 113, 133, 0.34) !important;
      }

      body[data-theme="dark"] .bg-sky-50 {
        background-color: rgba(12, 74, 110, 0.72) !important;
      }

      body[data-theme="dark"] .text-sky-700 {
        color: #bae6fd !important;
      }

      body[data-theme="dark"] .ring-sky-200 {
        --tw-ring-color: rgba(56, 189, 248, 0.34) !important;
      }

      body[data-theme="dark"] .bg-emerald-50 {
        background-color: rgba(6, 78, 59, 0.72) !important;
      }

      body[data-theme="dark"] .text-emerald-700 {
        color: #a7f3d0 !important;
      }

      body[data-theme="dark"] .ring-emerald-200 {
        --tw-ring-color: rgba(52, 211, 153, 0.34) !important;
      }

      body[data-theme="dark"] .bg-violet-50 {
        background-color: rgba(76, 29, 149, 0.72) !important;
      }

      body[data-theme="dark"] .text-violet-700 {
        color: #ddd6fe !important;
      }

      body[data-theme="dark"] .ring-violet-200 {
        --tw-ring-color: rgba(167, 139, 250, 0.34) !important;
      }

      body[data-theme="dark"] .filter-btn.bg-slate-950 {
        background-color: #14b8a6 !important;
        color: #042f2e !important;
      }

      body[data-theme="dark"] .border-slate-200,
      body[data-theme="dark"] .border-white\/70 {
        border-color: rgba(148, 163, 184, 0.22) !important;
      }

      body[data-theme="dark"] .text-slate-950,
      body[data-theme="dark"] .text-slate-900,
      body[data-theme="dark"] .text-slate-800,
      body[data-theme="dark"] .text-slate-700 {
        color: #e5edf8 !important;
      }

      body[data-theme="dark"] .text-slate-400 {
        color: #9aa7bb !important;
      }

      body[data-theme="dark"] .task-card:hover {
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.3);
      }

      body[data-theme="dark"] .progress-chart {
        background: conic-gradient(#2dd4bf var(--progress), rgba(51, 65, 85, 0.95) 0);
      }

      body[data-theme="dark"] .progress-chart::before {
        background: rgba(15, 23, 42, 0.96);
      }

      body[data-theme="dark"] .due-alert-card {
        border-color: rgba(251, 113, 133, 0.82) !important;
        box-shadow:
          0 0 0 1px rgba(251, 113, 133, 0.22),
          0 16px 34px rgba(0, 0, 0, 0.3);
      }

      .column {
        min-height: 35rem;
      }

      .task-list {
        min-height: 25rem;
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease;
      }

      .task-list.drag-over {
        background: rgba(255, 255, 255, 0.62);
        border-color: rgba(37, 99, 235, 0.28);
      }

      .task-card {
        cursor: grab;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .task-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 34px rgba(24, 31, 47, 0.12);
      }

      .task-card.dragging {
        opacity: 0.48;
        transform: rotate(1.5deg) scale(0.98);
      }

      .hide-scrollbar {
        scrollbar-width: none;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      @media (max-width: 768px) {
        .column {
          min-height: 30rem;
        }

        .task-list {
          min-height: 20rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-6 px-4 py-5 sm:px-6 lg:px-8">
      <header class="glass rounded-3xl px-5 py-6 sm:px-8">
        <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
          <div class="max-w-2xl">
            <div class="mb-4 inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white/70 px-3 py-1 text-xs font-bold uppercase tracking-[0.22em] text-slate-500">
              Premium productivity board
            </div>
            <h1 class="text-4xl font-black tracking-tight text-slate-950 sm:text-5xl">
              TaskFlow <span class="text-teal-600">Pro</span>
            </h1>
            <p class="mt-3 max-w-xl text-base leading-7 text-slate-600">
              Plan projects, track priority, follow deadlines, and move work from idea to done with a focused Kanban workspace.
            </p>
          </div>

          <div class="grid gap-3 sm:min-w-[28rem]">
            <button
              id="themeToggle"
              class="theme-toggle h-12 justify-center rounded-2xl border border-white/70 bg-white/70 px-4 text-sm font-black text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-teal-200 hover:text-teal-700"
              type="button"
              aria-pressed="false"
            >
              Dark Mode
            </button>
            <button
              id="notificationToggle"
              class="h-12 rounded-2xl border border-white/70 bg-white/70 px-4 text-sm font-black text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-rose-200 hover:text-rose-600"
              type="button"
            >
              Enable Alerts
            </button>
            <div class="grid grid-cols-3 gap-3">
            <div class="rounded-2xl border border-white/70 bg-white/70 p-4">
              <p class="text-xs font-bold uppercase tracking-wider text-slate-500">Total</p>
              <p id="totalTasks" class="mt-1 text-3xl font-black text-slate-950">0</p>
            </div>
            <div class="rounded-2xl border border-white/70 bg-white/70 p-4">
              <p class="text-xs font-bold uppercase tracking-wider text-slate-500">Done</p>
              <p id="doneTasks" class="mt-1 text-3xl font-black text-emerald-600">0</p>
            </div>
            <div class="rounded-2xl border border-white/70 bg-white/70 p-4">
              <p class="text-xs font-bold uppercase tracking-wider text-slate-500">Progress</p>
              <div class="mt-2 flex items-center gap-3">
                <div id="progressChart" class="progress-chart" aria-label="Progress chart" role="img">
                  <span id="progressPercent" class="progress-chart-value text-sm font-black text-slate-950">0%</span>
                </div>
                <p class="text-xs font-bold leading-5 text-slate-500">Done rate</p>
              </div>
            </div>
            </div>
          </div>
        </div>

        <div class="mt-6 h-2 overflow-hidden rounded-full bg-slate-200">
          <div id="progressBar" class="h-full w-0 rounded-full bg-gradient-to-r from-teal-500 via-sky-500 to-rose-500 transition-all duration-500"></div>
        </div>
      </header>

      <section class="soft-panel rounded-3xl p-4 sm:p-5">
        <form id="taskForm" class="grid gap-3 lg:grid-cols-[1fr_10rem_10rem_12rem_auto]">
          <input
            id="taskInput"
            type="text"
            maxlength="90"
            placeholder="Add a meaningful task..."
            class="h-12 rounded-2xl border border-slate-200 bg-white px-4 text-slate-900 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10"
            autocomplete="off"
          />
          <select
            id="priorityInput"
            class="h-12 rounded-2xl border border-slate-200 bg-white px-4 text-slate-700 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10"
          >
            <option value="High">High priority</option>
            <option value="Medium" selected>Medium priority</option>
            <option value="Low">Low priority</option>
          </select>
          <input
            id="dueInput"
            type="date"
            class="h-12 rounded-2xl border border-slate-200 bg-white px-4 text-slate-700 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10"
          />
          <input
            id="tagInput"
            type="text"
            maxlength="120"
            placeholder="Tags: Bug, Design"
            class="h-12 rounded-2xl border border-slate-200 bg-white px-4 text-slate-700 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10"
            autocomplete="off"
          />
          <button
            class="h-12 rounded-2xl bg-slate-950 px-6 font-black text-white shadow-lg shadow-slate-900/15 transition hover:-translate-y-0.5 hover:bg-teal-700"
            type="submit"
          >
            Add Task
          </button>
        </form>

        <div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div class="relative w-full sm:max-w-sm">
            <input
              id="searchInput"
              type="search"
              placeholder="Search tasks..."
              class="h-11 w-full rounded-2xl border border-slate-200 bg-white px-4 text-sm text-slate-800 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10"
            />
          </div>
          <div class="flex gap-2 overflow-x-auto hide-scrollbar">
            <button type="button" class="filter-btn rounded-full bg-slate-950 px-4 py-2 text-sm font-bold text-white" data-filter="All">All</button>
            <button type="button" class="filter-btn rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600" data-filter="High">High</button>
            <button type="button" class="filter-btn rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600" data-filter="Medium">Medium</button>
            <button type="button" class="filter-btn rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600" data-filter="Low">Low</button>
            <button type="button" id="clearDoneBtn" class="rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600 transition hover:text-rose-600">Clear Done</button>
          </div>
        </div>
      </section>

      <section class="grid flex-1 grid-cols-1 gap-5 lg:grid-cols-3">
        <article class="column soft-panel rounded-3xl p-4">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-xs font-black uppercase tracking-[0.18em] text-amber-600">Backlog</p>
              <h2 class="text-xl font-black text-slate-900">To Do</h2>
            </div>
            <span id="todo-count" class="rounded-full bg-amber-100 px-3 py-1 text-sm font-black text-amber-700">0</span>
          </div>
          <div class="task-list rounded-2xl border border-dashed border-slate-200 p-2" id="todo" data-status="todo"></div>
        </article>

        <article class="column soft-panel rounded-3xl p-4">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-xs font-black uppercase tracking-[0.18em] text-sky-600">Execution</p>
              <h2 class="text-xl font-black text-slate-900">In Progress</h2>
            </div>
            <span id="inprogress-count" class="rounded-full bg-sky-100 px-3 py-1 text-sm font-black text-sky-700">0</span>
          </div>
          <div class="task-list rounded-2xl border border-dashed border-slate-200 p-2" id="inprogress" data-status="inprogress"></div>
        </article>

        <article class="column soft-panel rounded-3xl p-4">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-xs font-black uppercase tracking-[0.18em] text-emerald-600">Shipped</p>
              <h2 class="text-xl font-black text-slate-900">Done</h2>
            </div>
            <span id="done-count" class="rounded-full bg-emerald-100 px-3 py-1 text-sm font-black text-emerald-700">0</span>
          </div>
          <div class="task-list rounded-2xl border border-dashed border-slate-200 p-2" id="done" data-status="done"></div>
        </article>
      </section>

      <footer class="pb-2 text-center text-sm font-semibold text-slate-500">
        Created by <span class="text-slate-950">Tanzim Ahmed Utsho</span>
      </footer>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state flex min-h-40 items-center justify-center rounded-2xl border border-dashed border-slate-200 bg-white/40 p-6 text-center text-sm font-semibold text-slate-400">
        Drop tasks here
      </div>
    </template>

    <script src="script.js"></script>
  </body>
</html>
