<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Pro | Premium Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #687083;
        --line: rgba(23, 32, 51, 0.1);
        --panel: rgba(255, 255, 255, 0.78);
        --shadow: 0 18px 60px rgba(40, 48, 72, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(251, 113, 133, 0.18), transparent 28rem),
          radial-gradient(circle at 78% 5%, rgba(20, 184, 166, 0.18), transparent 26rem),
          linear-gradient(135deg, #f8fafc 0%, #eef2f7 52%, #f7f1ea 100%);
        transition:
          background 0.25s ease,
          color 0.25s ease;
      }

      body[data-theme="dark"] {
        color-scheme: dark;
        --ink: #e5edf8;
        --muted: #9aa7bb;
        --line: rgba(226, 232, 240, 0.14);
        --panel: rgba(15, 23, 42, 0.76);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
        background:
          radial-gradient(circle at 18% 10%, rgba(20, 184, 166, 0.16), transparent 28rem),
          radial-gradient(circle at 78% 6%, rgba(244, 63, 94, 0.14), transparent 26rem),
          linear-gradient(135deg, #07111f 0%, #101827 52%, #17111c 100%);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.7;
      }

      .glass {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.72);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .soft-panel {
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid var(--line);
        box-shadow: 0 14px 40px rgba(40, 48, 72, 0.08);
        backdrop-filter: blur(16px);
      }

      .theme-toggle {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
      }

      .theme-toggle::before {
        width: 1.35rem;
        height: 1.35rem;
        border-radius: 999px;
        background: #0f172a;
        box-shadow: inset -0.35rem -0.2rem 0 #f8fafc;
        content: "";
        transition:
          background-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .progress-chart {
        --progress: 0deg;
        width: 4.25rem;
        height: 4.25rem;
        border-radius: 999px;
        background: conic-gradient(#14b8a6 var(--progress), rgba(226, 232, 240, 0.9) 0);
        display: grid;
        place-items: center;
      }

      .progress-chart::before {
        width: 3rem;
        height: 3rem;
        border-radius: inherit;
        background: rgba(255, 255, 255, 0.94);
        content: "";
        grid-area: 1 / 1;
      }

      .progress-chart-value {
        grid-area: 1 / 1;
        position: relative;
        z-index: 1;
      }

      .due-alert-card {
        border-color: rgba(225, 29, 72, 0.75) !important;
        box-shadow:
          0 0 0 1px rgba(225, 29, 72, 0.16),
          0 16px 34px rgba(225, 29, 72, 0.14);
      }

      body[data-theme="dark"] .theme-toggle::before {
        background: #facc15;
        box-shadow: 0 0 0 0.28rem rgba(250, 204, 21, 0.16);
      }

      body[data-theme="dark"] .glass,
      body[data-theme="dark"] .soft-panel {
        background: var(--panel);
        border-color: rgba(148, 163, 184, 0.18);
      }

      body[data-theme="dark"] .task-list.drag-over {
        background: rgba(30, 41, 59, 0.68);
        border-color: rgba(45, 212, 191, 0.34);
      }

      body[data-theme="dark"] input,
      body[data-theme="dark"] select,
      body[data-theme="dark"] textarea,
      body[data-theme="dark"] .task-card,
      body[data-theme="dark"] .empty-state,
      body[data-theme="dark"] .filter-btn,
      body[data-theme="dark"] #clearDoneBtn {
        background-color: rgba(15, 23, 42, 0.82) !important;
        border-color: rgba(148, 163, 184, 0.22) !important;
        color: #e5edf8 !important;
      }

      body[data-theme="dark"] input::placeholder,
      body[data-theme="dark"] textarea::placeholder {
        color: #7f8da3;
      }

      body[data-theme="dark"] .bg-white,
      body[data-theme="dark"] .bg-white\/40,
      body[data-theme="dark"] .bg-white\/70 {
        background-color: rgba(15, 23, 42, 0.72) !important;
      }

      body[data-theme="dark"] .bg-slate-100,
      body[data-theme="dark"] .bg-slate-200 {
        background-color: rgba(51, 65, 85, 0.82) !important;
      }

      body[data-theme="dark"] .bg-slate-50 {
        background-color: rgba(51, 65, 85, 0.92) !important;
      }

      body[data-theme="dark"] .text-slate-500,
      body[data-theme="dark"] .text-slate-600 {
        color: #cbd5e1 !important;
      }

      body[data-theme="dark"] .ring-slate-200 {
        --tw-ring-color: rgba(148, 163, 184, 0.32) !important;
      }

      body[data-theme="dark"] .bg-amber-50 {
        background-color: rgba(120, 53, 15, 0.72) !important;
      }

      body[data-theme="dark"] .text-amber-700 {
        color: #fde68a !important;
      }

      body[data-theme="dark"] .ring-amber-200 {
        --tw-ring-color: rgba(251, 191, 36, 0.34) !important;
      }

      body[data-theme="dark"] .bg-rose-50 {
        background-color: rgba(127, 29, 29, 0.72) !important;
      }

      body[data-theme="dark"] .text-rose-700 {
        color: #fecdd3 !important;
      }

      body[data-theme="dark"] .ring-rose-200 {
        --tw-ring-color: rgba(251, 113, 133, 0.34) !important;
      }

      body[data-theme="dark"] .bg-sky-50 {
        background-color: rgba(12, 74, 110, 0.72) !important;
      }

      body[data-theme="dark"] .text-sky-700 {
        color: #bae6fd !important;
      }

      body[data-theme="dark"] .ring-sky-200 {
        --tw-ring-color: rgba(56, 189, 248, 0.34) !important;
      }

      body[data-theme="dark"] .bg-emerald-50 {
        background-color: rgba(6, 78, 59, 0.72) !important;
      }

      body[data-theme="dark"] .text-emerald-700 {
        color: #a7f3d0 !important;
      }

      body[data-theme="dark"] .ring-emerald-200 {
        --tw-ring-color: rgba(52, 211, 153, 0.34) !important;
      }

      body[data-theme="dark"] .bg-violet-50 {
        background-color: rgba(76, 29, 149, 0.72) !important;
      }

      body[data-theme="dark"] .text-violet-700 {
        color: #ddd6fe !important;
      }

      body[data-theme="dark"] .ring-violet-200 {
        --tw-ring-color: rgba(167, 139, 250, 0.34) !important;
      }

      body[data-theme="dark"] .filter-btn.bg-slate-950 {
        background-color: #14b8a6 !important;
        color: #042f2e !important;
      }

      body[data-theme="dark"] .border-slate-200,
      body[data-theme="dark"] .border-white\/70 {
        border-color: rgba(148, 163, 184, 0.22) !important;
      }

      body[data-theme="dark"] .text-slate-950,
      body[data-theme="dark"] .text-slate-900,
      body[data-theme="dark"] .text-slate-800,
      body[data-theme="dark"] .text-slate-700 {
        color: #e5edf8 !important;
      }

      body[data-theme="dark"] .text-slate-400 {
        color: #9aa7bb !important;
      }

      body[data-theme="dark"] .task-card:hover {
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.3);
      }

      body[data-theme="dark"] .progress-chart {
        background: conic-gradient(#2dd4bf var(--progress), rgba(51, 65, 85, 0.95) 0);
      }

      body[data-theme="dark"] .progress-chart::before {
        background: rgba(15, 23, 42, 0.96);
      }

      body[data-theme="dark"] .due-alert-card {
        border-color: rgba(251, 113, 133, 0.82) !important;
        box-shadow:
          0 0 0 1px rgba(251, 113, 133, 0.22),
          0 16px 34px rgba(0, 0, 0, 0.3);
      }

      .column {
        min-height: 35rem;
      }

      .task-list {
        min-height: 25rem;
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease;
      }

      .task-list.drag-over {
        background: rgba(255, 255, 255, 0.62);
        border-color: rgba(37, 99, 235, 0.28);
      }

      .task-card {
        cursor: grab;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .task-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 34px rgba(24, 31, 47, 0.12);
      }

      .task-card.dragging {
        opacity: 0.48;
        transform: rotate(1.5deg) scale(0.98);
      }

      .hide-scrollbar {
        scrollbar-width: none;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      @media (max-width: 768px) {
        .column {
          min-height: 30rem;
        }

        .task-list {
          min-height: 20rem;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script src="script.js"></script>
  </body>
</html>
